name: Deploy Frontend to GCP VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "==> Pulling latest frontend code..."
            cd /opt/elmanara/aspc-website
            git fetch origin main
            git reset --hard origin/main

            echo "==> Rebuilding frontend container..."
            cd /opt/elmanara/backend
            docker compose up -d --build --no-deps frontend

            echo "==> Waiting for container to be healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' elmanara_frontend 2>/dev/null || echo "starting")
              echo "Health: $STATUS (attempt $i/12)"
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 5
            done

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Frontend deployment complete!"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Frontend deployment failed! Check the logs above."
